<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Mening Saytim</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        /* NAVBAR */
        nav {
            background: #333;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        nav h1 {
            font-size: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00c3ff;
        }

        /* HERO */
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            margin-bottom: 20px;
        }

        .btn {
            background: white;
            color: #333;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: white;
        }

        /* FOOTER */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <h1>MySite</h1>
        <ul>
            <li><a href="#">Bosh sahifa</a></li>
            <li><a href="#">Haqida</a></li>
            <li><a href="#">Aloqa</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div>
            <h2>Salom! Bu mening saytim</h2>
            <p>Men frontend dasturchiman 🚀</p>
            <a href="#" class="btn">Boshlash</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Mening saytim</p>
    </footer>

</body>

</html>
